<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Контакты | АНО «Южный ЦСЭ»</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="container header-inner">
            <a href="index.html" class="logo">⚖️ АНО «Южный ЦСЭ»</a>
            <button class="burger">☰</button>
            <nav class="nav">
                <a href="index.html">Главная</a>
                <a href="services.html">Услуги</a>
                <a href="about.html">О нас</a>
                <a href="contact.html">Контакты</a>
            </nav>
        </div>
    </header>

    <main>
        <section class="hero" style="padding: 60px 0;">
            <div class="container hero-content">
                <h1>Свяжитесь с нами</h1>
            </div>
        </section>

        <section class="section">
            <div class="container grid" style="align-items: start;">
                
                <!-- Форма -->
                <div class="form-box">
                    <h3 style="margin-bottom: 20px; text-align: center;">Заявка на экспертизу</h3>
                    <form id="contactForm">
                        <div class="form-group">
                            <label>Ваше имя</label>
                            <input type="text" placeholder="Иванов Иван" required>
                        </div>
                        <div class="form-group">
                            <label>Телефон</label>
                            <input type="tel" placeholder="+7 (999) 000-00-00" required>
                        </div>
                        <div class="form-group">
                            <label>Вид экспертизы</label>
                            <select>
                                <option>Компьютерная экспертиза</option>
                                <option>Мобильные устройства</option>
                                <option>Консультация</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Сообщение</label>
                            <textarea rows="4" placeholder="Опишите задачу..."></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary" style="width: 100%;">Отправить</button>
                    </form>
                </div>

                <!-- Инфо -->
                <div class="card">
                    <h3>📍 Наш адрес</h3>
                    <p>г. Ростов-на-Дону<br>ул. Таганрогская (ориентировочно)</p>
                    <br>
                    <h3> Контакты</h3>
                    <p>+7 (863) 000-00-00<br>info@yuzhny-cse.ru</p>
                    <br>
                    <h3>🕒 Режим работы</h3>
                    <p>Пн-Пт: 09:00 – 18:00</p>
                </div>

            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>© 2026 АНО «Южный центр судебной экспертизы».</p>
        </div>
    </footer>

    <!-- КНОПКА ТЕМЫ (обязательно с id="theme-toggle") -->
    <button class="theme-toggle" id="theme-toggle">🌙</button>

    <script src="script.js"></script>
</body>
</html>
